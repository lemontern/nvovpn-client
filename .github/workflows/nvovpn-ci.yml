name: 'NvoVPN CI'

# Сборка клиента NvoVPN на GitHub-hosted раннерах (Qt локально не собираем).
# Пока Windows (приоритет ТЗ). Android добавим после зелёного Windows.
# Секреты gateway Amnezia (PROD_AGW_* и т.д.) в нашем репо не заданы → пустые строки,
# нам они не нужны (свой REST-API, не gateway). Кастомные conan-пакеты берутся из ./recipes
# + публичного remote artifactory.amnezia.org (creds нужны только для upload, не для build).

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

env:
  QT_MIRROR: https://mirrors.ocf.berkeley.edu/qt/

jobs:
  Build-Windows:
    # windows-2022 = VS2022 (msvc 194): совпадает с Qt win64_msvc2022_64 и с публичными
    # conan-пребилтами Amnezia. windows-latest уже редиректит на VS2026 (Visual Studio 18) —
    # пребилтов под него нет, conan собирает из исходников и падает на неизвестном генераторе.
    runs-on: windows-2022

    env:
      QT_VERSION: 6.10.1
      QIF_VERSION: 4.7
      PROD_AGW_PUBLIC_KEY: ${{ secrets.PROD_AGW_PUBLIC_KEY }}
      PROD_S3_ENDPOINT: ${{ secrets.PROD_S3_ENDPOINT }}
      FALLBACK_S3_ENDPOINT: ${{ secrets.FALLBACK_S3_ENDPOINT }}
      DEV_AGW_PUBLIC_KEY: ${{ secrets.DEV_AGW_PUBLIC_KEY }}
      DEV_AGW_ENDPOINT: ${{ secrets.DEV_AGW_ENDPOINT }}
      DEV_S3_ENDPOINT: ${{ secrets.DEV_S3_ENDPOINT }}
      FREE_V2_ENDPOINT: ${{ secrets.FREE_V2_ENDPOINT }}
      PREM_V1_ENDPOINT: ${{ secrets.PREM_V1_ENDPOINT }}

    steps:
      - name: 'Get sources'
        uses: actions/checkout@v4
        with:
          submodules: 'true'
          fetch-depth: 10

      - name: 'Install Qt'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtremoteobjects qt5compat qtshadertools'
          dir: ${{ runner.temp }}
          setup-python: 'true'
          tools: 'tools_ifw'
          set-env: 'true'
          aqtversion: '==3.3.0'
          py7zrversion: '==0.22.*'
          extra: '--base ${{ env.QT_MIRROR }}'

      - name: 'Setup msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: 'x64'

      - name: 'Setup .NET SDK'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 'Install WiX Toolset'
        shell: powershell
        run: |
          dotnet tool install --global wix --version 4.0.6
          wix extension add -g WixToolset.UI.wixext/4.0.6
          wix extension add -g WixToolset.Util.wixext/4.0.6
          wix extension list -g

      - name: 'Setup python (conan)'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 'Install conan'
        run: pip install "conan==2.28.0"

      - name: 'Build project'
        shell: cmd
        env:
          QT_INSTALL_DIR: ${{ runner.temp }}
        # Только IFW (.exe) — им раздаём с сайта. WIX (.msi) пока выключен:
        # после полного rename его авто-Id фрагмента службы (CM_CP_<comp>.<exe>) требует
        # подбора под CPack; .msi сейчас не нужен. Вернём при необходимости.
        run: |
          set WIX_ROOT_PATH=%USERPROFILE%\.dotnet\tools
          deploy\build.bat --installer ifw

      - name: 'Upload installers'
        uses: actions/upload-artifact@v4
        with:
          name: nvovpn-windows-x64
          path: |
            deploy/build/*_windows_x64.exe
          retention-days: 14
          if-no-files-found: warn

  Build-Android:
    runs-on: ubuntu-latest   # вместо self-hosted android-runner Amnezia
    env:
      ANDROID_PLATFORM: android-28
      NDK_VERSION: 27.0.11718014
      QT_VERSION: 6.10.1
      QT_MODULES: 'qtremoteobjects qt5compat qtimageformats qtshadertools'
      PROD_AGW_PUBLIC_KEY: ${{ secrets.PROD_AGW_PUBLIC_KEY }}
      PROD_S3_ENDPOINT: ${{ secrets.PROD_S3_ENDPOINT }}
      FALLBACK_S3_ENDPOINT: ${{ secrets.FALLBACK_S3_ENDPOINT }}
      DEV_AGW_PUBLIC_KEY: ${{ secrets.DEV_AGW_PUBLIC_KEY }}
      DEV_AGW_ENDPOINT: ${{ secrets.DEV_AGW_ENDPOINT }}
      DEV_S3_ENDPOINT: ${{ secrets.DEV_S3_ENDPOINT }}
      FREE_V2_ENDPOINT: ${{ secrets.FREE_V2_ENDPOINT }}
      PREM_V1_ENDPOINT: ${{ secrets.PREM_V1_ENDPOINT }}

    steps:
      - name: 'Get sources'
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: 'Install desktop Qt (host tools)'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: ${{ env.QT_MODULES }}
          dir: ${{ runner.temp }}
          py7zrversion: '==0.22.*'
          extra: '--base ${{ env.QT_MIRROR }}'

      - name: 'Install android_arm64_v8a Qt'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: ${{ env.QT_MODULES }}
          dir: ${{ runner.temp }}
          py7zrversion: '==0.22.*'
          extra: '--base ${{ env.QT_MIRROR }}'

      - name: 'Install android_armv7 Qt'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'android'
          arch: 'android_armv7'
          modules: ${{ env.QT_MODULES }}
          dir: ${{ runner.temp }}
          py7zrversion: '==0.22.*'
          extra: '--base ${{ env.QT_MIRROR }}'

      - name: 'Setup Java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 'Setup Android SDK'
        uses: android-actions/setup-android@v4
        with:
          packages: "platforms;${{ env.ANDROID_PLATFORM }} ndk;${{ env.NDK_VERSION }}"

      - name: 'Setup python (conan)'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 'Install conan'
        run: pip install "conan==2.28.0"

      - name: 'Generate signing keystore'
        # APK ОБЯЗАН быть подписан, иначе Android не устанавливает («Не установлено»).
        # Пока генерим keystore в CI (тестовая подпись). Для стабильных обновлений/раздачи —
        # перейти на постоянный keystore через secret (ANDROID_RELEASE_KEYSTORE_BASE64).
        run: |
          keytool -genkeypair -v -keystore "$GITHUB_WORKSPACE/nvovpn.keystore" \
            -alias nvovpn -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass nvovpn2026 -keypass nvovpn2026 \
            -dname "CN=NvoVPN, O=NvoVPN, C=US"

      - name: 'Build project (signed, arm64-v8a + armeabi-v7a)'
        env:
          QT_INSTALL_DIR: ${{ runner.temp }}
          QT_ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/nvovpn.keystore
          QT_ANDROID_KEYSTORE_ALIAS: nvovpn
          QT_ANDROID_KEYSTORE_STORE_PASS: nvovpn2026
          QT_ANDROID_KEYSTORE_KEY_PASS: nvovpn2026
        run: |
          deploy/build.sh -t android --sign --abi arm64-v8a --abi armeabi-v7a

      - name: 'Upload APK'
        uses: actions/upload-artifact@v4
        with:
          name: nvovpn-android
          path: |
            deploy/build/client/android-build/*.apk
          retention-days: 14
          if-no-files-found: warn
