name: 'NvoVPN CI'

# Сборка клиента NvoVPN на GitHub-hosted раннерах (Qt локально не собираем).
# Пока Windows (приоритет ТЗ). Android добавим после зелёного Windows.
# Секреты gateway Amnezia (PROD_AGW_* и т.д.) в нашем репо не заданы → пустые строки,
# нам они не нужны (свой REST-API, не gateway). Кастомные conan-пакеты берутся из ./recipes
# + публичного remote artifactory.amnezia.org (creds нужны только для upload, не для build).

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

env:
  QT_MIRROR: https://mirrors.ocf.berkeley.edu/qt/

# Нужно для авто-выкладки собранных билдов в GitHub Release (gh release upload).
permissions:
  contents: write

# Новый пуш в ту же ветку отменяет предыдущую (незавершённую) сборку — без лишних параллельных прогонов.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build-Windows:
    # windows-2022 = VS2022 (msvc 194): совпадает с Qt win64_msvc2022_64 и с публичными
    # conan-пребилтами Amnezia. windows-latest уже редиректит на VS2026 (Visual Studio 18) —
    # пребилтов под него нет, conan собирает из исходников и падает на неизвестном генераторе.
    runs-on: windows-2022

    env:
      QT_VERSION: 6.10.1
      QIF_VERSION: 4.7
      PROD_AGW_PUBLIC_KEY: ${{ secrets.PROD_AGW_PUBLIC_KEY }}
      PROD_S3_ENDPOINT: ${{ secrets.PROD_S3_ENDPOINT }}
      FALLBACK_S3_ENDPOINT: ${{ secrets.FALLBACK_S3_ENDPOINT }}
      DEV_AGW_PUBLIC_KEY: ${{ secrets.DEV_AGW_PUBLIC_KEY }}
      DEV_AGW_ENDPOINT: ${{ secrets.DEV_AGW_ENDPOINT }}
      DEV_S3_ENDPOINT: ${{ secrets.DEV_S3_ENDPOINT }}
      FREE_V2_ENDPOINT: ${{ secrets.FREE_V2_ENDPOINT }}
      PREM_V1_ENDPOINT: ${{ secrets.PREM_V1_ENDPOINT }}

    steps:
      - name: 'Get sources'
        uses: actions/checkout@v4
        with:
          submodules: 'true'
          fetch-depth: 10

      - name: 'Install Qt'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtremoteobjects qt5compat qtshadertools'
          dir: ${{ runner.temp }}
          setup-python: 'true'
          tools: 'tools_ifw'
          set-env: 'true'
          aqtversion: '==3.3.0'
          py7zrversion: '==0.22.*'
          extra: '--base ${{ env.QT_MIRROR }}'

      - name: 'Setup msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: 'x64'

      - name: 'Setup .NET SDK'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 'Install WiX Toolset'
        shell: powershell
        run: |
          dotnet tool install --global wix --version 4.0.6
          wix extension add -g WixToolset.UI.wixext/4.0.6
          wix extension add -g WixToolset.Util.wixext/4.0.6
          wix extension list -g

      - name: 'Setup python (conan)'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 'Install conan'
        run: pip install "conan==2.28.0"

      - name: 'Build project'
        shell: cmd
        env:
          QT_INSTALL_DIR: ${{ runner.temp }}
        # Только IFW (.exe) — им раздаём с сайта. WIX (.msi) пока выключен:
        # после полного rename его авто-Id фрагмента службы (CM_CP_<comp>.<exe>) требует
        # подбора под CPack; .msi сейчас не нужен. Вернём при необходимости.
        run: |
          set WIX_ROOT_PATH=%USERPROFILE%\.dotnet\tools
          deploy\build.bat --installer ifw

      - name: 'Upload installers'
        uses: actions/upload-artifact@v4
        with:
          name: nvovpn-windows-x64
          path: |
            deploy/build/*_windows_x64.exe
          retention-days: 14
          if-no-files-found: warn

      # Авто-выкладка в релиз (стабильная ссылка для раздачи на сайте). Только main.
      - name: 'Publish to Release'
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload test-win-1 deploy/build/*_windows_x64.exe --clobber -R "${{ github.repository }}"

  Build-Android:
    runs-on: ubuntu-latest   # вместо self-hosted android-runner Amnezia
    env:
      ANDROID_PLATFORM: android-28   # conan api_level / minSdk (НЕ менять: prebuilt libssh собран под api 28;
                                     # api 34 → conan пересобирает libssh из исходников и падает на openssl).
                                     # compileSdk/targetSdk=34 задаются отдельно (SDK platform 34 + android.cmake).
      NDK_VERSION: 27.0.11718014
      QT_VERSION: 6.10.1
      QT_MODULES: 'qtremoteobjects qt5compat qtimageformats qtshadertools'
      PROD_AGW_PUBLIC_KEY: ${{ secrets.PROD_AGW_PUBLIC_KEY }}
      PROD_S3_ENDPOINT: ${{ secrets.PROD_S3_ENDPOINT }}
      FALLBACK_S3_ENDPOINT: ${{ secrets.FALLBACK_S3_ENDPOINT }}
      DEV_AGW_PUBLIC_KEY: ${{ secrets.DEV_AGW_PUBLIC_KEY }}
      DEV_AGW_ENDPOINT: ${{ secrets.DEV_AGW_ENDPOINT }}
      DEV_S3_ENDPOINT: ${{ secrets.DEV_S3_ENDPOINT }}
      FREE_V2_ENDPOINT: ${{ secrets.FREE_V2_ENDPOINT }}
      PREM_V1_ENDPOINT: ${{ secrets.PREM_V1_ENDPOINT }}

    steps:
      - name: 'Get sources'
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: 'Install desktop Qt (host tools)'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: ${{ env.QT_MODULES }}
          dir: ${{ runner.temp }}
          py7zrversion: '==0.22.*'
          extra: '--base ${{ env.QT_MIRROR }}'

      - name: 'Install android_arm64_v8a Qt'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: ${{ env.QT_MODULES }}
          dir: ${{ runner.temp }}
          py7zrversion: '==0.22.*'
          extra: '--base ${{ env.QT_MIRROR }}'

      - name: 'Install android_armv7 Qt'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'android'
          arch: 'android_armv7'
          modules: ${{ env.QT_MODULES }}
          dir: ${{ runner.temp }}
          py7zrversion: '==0.22.*'
          extra: '--base ${{ env.QT_MIRROR }}'

      - name: 'Setup Java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 'Setup Android SDK'
        uses: android-actions/setup-android@v4
        with:
          packages: "platforms;android-34 build-tools;34.0.0 ndk;${{ env.NDK_VERSION }}"

      - name: 'Setup python (conan)'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 'Install conan'
        run: pip install "conan==2.28.0"

      - name: 'Decode signing keystore from secret'
        # Постоянный keystore (один ключ для всех билдов) → обновления ставятся поверх
        # без переустановки. APK обязан быть подписан, иначе Android «Не установлено».
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/nvovpn.keystore"

      - name: 'Build project (signed, arm64-v8a + armeabi-v7a)'
        env:
          QT_INSTALL_DIR: ${{ runner.temp }}
          QT_ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/nvovpn.keystore
          QT_ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          QT_ANDROID_KEYSTORE_STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_STORE_PASS }}
          QT_ANDROID_KEYSTORE_KEY_PASS: ${{ secrets.ANDROID_KEYSTORE_STORE_PASS }}
        run: |
          deploy/build.sh -t android --sign --abi arm64-v8a --abi armeabi-v7a

      - name: 'Upload APK'
        uses: actions/upload-artifact@v4
        with:
          name: nvovpn-android
          path: |
            deploy/build/client/android-build/*.apk
          retention-days: 14
          if-no-files-found: warn

      # Авто-выкладка в релиз (стабильная ссылка для раздачи на сайте). Только main.
      - name: 'Publish to Release'
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find deploy/build/client/android-build -name "*.apk" ! -name "*unsigned*" | head -1)
          echo "APK: $APK"
          cp "$APK" NvoVPN.apk
          gh release upload test-android-1 NvoVPN.apk --clobber -R "${{ github.repository }}"

  # macOS — Network Extension (рабочий VPN), раздача .dmg вне App Store (Developer ID).
  # ЭТАП 1: добиться компиляции (Qt macos + conan + код). Подпись отключена на сборке
  # (CODE_SIGNING_ALLOWED=NO) — Developer ID подпись + нотаризация + .dmg добавим после зелёной компиляции.
  Build-macOS:
    runs-on: macos-14
    env:
      QT_VERSION: 6.10.1
      QT_MODULES: 'qtremoteobjects qt5compat qtimageformats qtshadertools'
      PROD_AGW_PUBLIC_KEY: ${{ secrets.PROD_AGW_PUBLIC_KEY }}
      PROD_S3_ENDPOINT: ${{ secrets.PROD_S3_ENDPOINT }}
      FALLBACK_S3_ENDPOINT: ${{ secrets.FALLBACK_S3_ENDPOINT }}
      DEV_AGW_PUBLIC_KEY: ${{ secrets.DEV_AGW_PUBLIC_KEY }}
      DEV_AGW_ENDPOINT: ${{ secrets.DEV_AGW_ENDPOINT }}
      DEV_S3_ENDPOINT: ${{ secrets.DEV_S3_ENDPOINT }}
      FREE_V2_ENDPOINT: ${{ secrets.FREE_V2_ENDPOINT }}
      PREM_V1_ENDPOINT: ${{ secrets.PREM_V1_ENDPOINT }}

    steps:
      - name: 'Get sources'
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: 'Install Qt (macos)'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: ${{ env.QT_MODULES }}
          dir: ${{ runner.temp }}
          py7zrversion: '==0.22.*'
          extra: '--base ${{ env.QT_MIRROR }}'

      - name: 'Select Xcode'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: 'Setup python (conan)'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 'Install conan'
        run: |
          pip install "conan==2.28.0"
          conan profile detect --force

      - name: 'Configure (cmake) — тянет conan-пакеты'
        env:
          QT_INSTALL_DIR: ${{ runner.temp }}
        # build.sh для macos-ne хардкодит DEPLOY=1 (Manual signing + App Store профили, которых нет) —
        # вызываем cmake напрямую. CODE_SIGNING_ALLOWED=NO отключает подпись на этапе сборки.
        run: |
          QT_ROOT="$(ls -d ${{ runner.temp }}/Qt/${QT_VERSION}/macos 2>/dev/null | head -1)"
          echo "QT_ROOT=$QT_ROOT"
          cmake -S . -B build -G Xcode \
            -DMACOS_NE=TRUE \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT"

      - name: 'Fix Go cgo symbol clash in libwg-go.a'
        # libwg-go.a (AmneziaWG, Go) и OpenVPNAdapter.framework (тоже содержит Go cgo) дают
        # "duplicate cgo symbols" при линковке NE на ld-prime. Мы AmneziaWG-only — OpenVPN мёртвый код
        # (не вызывается, его Go-рантайм не активируется). Локализуем cgo-символы в libwg-go.a через
        # `ld -r -unexported_symbols_list` → они перестают быть глобальными → конфликта нет.
        run: |
          set -e
          WGGO="$(find "$HOME/.conan2" -path '*awg*/p/lib/libwg-go.a' 2>/dev/null | head -1)"
          echo "libwg-go.a: $WGGO"
          test -n "$WGGO" || { echo "libwg-go.a не найден"; exit 1; }
          printf '%s\n' \
            __cgo_set_stacklo \
            __cgo_get_context_function \
            _x_cgo_notify_runtime_init_done \
            _x_cgo_sys_thread_create \
            _x_cgo_bindm \
            _x_cgo_pthread_key_created \
            __cgo_wait_runtime_init_done \
            __cgo_try_pthread_create \
            _x_crosscall2_ptr > /tmp/cgo_hidden.txt
          ARCHS="$(lipo -archs "$WGGO" 2>/dev/null || echo "x86_64")"
          echo "Архитектуры: $ARCHS"
          FIXED=()
          for arch in $ARCHS; do
            if [ "$(echo $ARCHS | wc -w)" -gt 1 ]; then
              lipo "$WGGO" -thin "$arch" -output "/tmp/wg-$arch.a"
            else
              cp "$WGGO" "/tmp/wg-$arch.a"
            fi
            ld -r -arch "$arch" -all_load -unexported_symbols_list /tmp/cgo_hidden.txt "/tmp/wg-$arch.a" -o "/tmp/wg-$arch.o"
            rm -f "/tmp/wg-$arch-fixed.a"
            ar -crs "/tmp/wg-$arch-fixed.a" "/tmp/wg-$arch.o"
            FIXED+=("/tmp/wg-$arch-fixed.a")
          done
          if [ "${#FIXED[@]}" -gt 1 ]; then
            lipo -create "${FIXED[@]}" -output "$WGGO"
          else
            cp "${FIXED[0]}" "$WGGO"
          fi
          echo "✓ libwg-go.a пропатчен (cgo-символы локализованы)"

      - name: 'Build macOS app (unsigned)'
        run: |
          cmake --build build --config Release -- -allowProvisioningUpdates CODE_SIGNING_ALLOWED=NO

      - name: 'Import Developer ID certificate + provisioning profiles'
        env:
          P12_B64: ${{ secrets.APPLE_DEVID_P12_BASE64 }}
          P12_PASS: ${{ secrets.APPLE_DEVID_P12_PASSWORD }}
          PROFILE_APP_B64: ${{ secrets.APPLE_PROFILE_APP_BASE64 }}
          PROFILE_NE_B64: ${{ secrets.APPLE_PROFILE_NE_BASE64 }}
        run: |
          set -e
          KEYCHAIN="$RUNNER_TEMP/nvovpn.keychain-db"
          KCPASS="ci-$RANDOM"
          security create-keychain -p "$KCPASS" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"
          security unlock-keychain -p "$KCPASS" "$KEYCHAIN"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$P12_PASS" -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPASS" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security find-identity -v -p codesigning "$KEYCHAIN"
          # provisioning profiles → встроим в .app/.appex как embedded.provisionprofile
          echo "$PROFILE_APP_B64" | base64 --decode > "$RUNNER_TEMP/app.provisionprofile"
          echo "$PROFILE_NE_B64"  | base64 --decode > "$RUNNER_TEMP/ne.provisionprofile"
          echo "KEYCHAIN=$KEYCHAIN" >> $GITHUB_ENV
          echo "KCPASS=$KCPASS" >> $GITHUB_ENV

      - name: 'Codesign (Developer ID, hardened runtime)'
        run: |
          set -e
          APP="$(find build -name 'NvoVPN.app' -maxdepth 4 | head -1)"
          echo "APP=$APP"
          IDENTITY="Developer ID Application: Snaiderz, LLC (${{ secrets.APPLE_TEAM_ID }})"
          security unlock-keychain -p "$KCPASS" "$KEYCHAIN"
          APPEX="$(find "$APP" -name '*.appex' -maxdepth 4 | head -1)"
          # NB: provisioning profiles НЕ встраиваем — для Developer ID .app с packet-tunnel NE они
          # ломают запуск через launchd (error 163, подтверждено локально на Mac). Developer ID +
          # нотаризация + валидные entitlements достаточны. Подписываем изнутри наружу: фреймворки → appex → app.
          find "$APP/Contents/Frameworks" -name '*.framework' -maxdepth 1 2>/dev/null | while read fw; do
            codesign --force --options runtime --timestamp --keychain "$KEYCHAIN" --sign "$IDENTITY" "$fw" || true
          done
          find "$APP/Contents/Frameworks" -name '*.dylib' 2>/dev/null | while read dy; do
            codesign --force --options runtime --timestamp --keychain "$KEYCHAIN" --sign "$IDENTITY" "$dy" || true
          done
          # Developer ID (вне App Store) entitlements. Генерим чистые: БЕЗ app-sandbox и
          # system-extension.install — они для App Store/sysext и ломают запуск через launchd
          # (error 163 "spawn failed"), что подтверждено локально на Mac. Оставляем только VPN/NE.
          TEAM="${{ secrets.APPLE_TEAM_ID }}"
          APP_ENT="$RUNNER_TEMP/app.entitlements"
          NE_ENT="$RUNNER_TEMP/ne.entitlements"
          cat > "$APP_ENT" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>com.apple.developer.networking.networkextension</key><array><string>packet-tunnel-provider</string></array>
            <key>com.apple.developer.networking.vpn.api</key><array><string>allow-vpn</string></array>
            <key>com.apple.security.application-groups</key><array><string>group.com.nvovpn.app</string></array>
            <key>keychain-access-groups</key><array><string>$TEAM.com.nvovpn.app</string></array>
          </dict></plist>
          EOF
          cat > "$NE_ENT" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>com.apple.developer.networking.networkextension</key><array><string>packet-tunnel-provider</string></array>
            <key>com.apple.developer.networking.vpn.api</key><array><string>allow-vpn</string></array>
            <key>com.apple.security.application-groups</key><array><string>group.com.nvovpn.app</string></array>
          </dict></plist>
          EOF
          # heredoc в YAML добавляет ведущие пробелы — убираем
          sed -i '' 's/^          //' "$APP_ENT" "$NE_ENT"
          echo "=== app entitlements (Developer ID, без sandbox) ==="; cat "$APP_ENT"
          if [ -n "$APPEX" ]; then
            codesign --force --options runtime --timestamp --keychain "$KEYCHAIN" \
              --entitlements "$NE_ENT" \
              --sign "$IDENTITY" "$APPEX"
          fi
          codesign --force --options runtime --timestamp --keychain "$KEYCHAIN" \
            --entitlements "$APP_ENT" \
            --sign "$IDENTITY" "$APP"
          echo "=== Проверка подписи ==="
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "APP=$APP" >> $GITHUB_ENV

      - name: 'Notarize + staple'
        env:
          ASC_KEY_B64: ${{ secrets.APPLE_ASC_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APPLE_ASC_ISSUER_ID }}
        run: |
          set -e
          echo "$ASC_KEY_B64" | base64 --decode > "$RUNNER_TEMP/asc.p8"
          # Нотаризуем zip с .app, потом staple на .app
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/NvoVPN.zip"
          xcrun notarytool submit "$RUNNER_TEMP/NvoVPN.zip" \
            --key "$RUNNER_TEMP/asc.p8" --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER" \
            --wait
          xcrun stapler staple "$APP"
          echo "✓ нотаризовано и застейплено"

      - name: 'Create .dmg'
        run: |
          set -e
          STAGE="$RUNNER_TEMP/dmg"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "NvoVPN" -srcfolder "$STAGE" -ov -format UDZO NvoVPN.dmg
          # подписать и нотаризовать сам dmg
          IDENTITY="Developer ID Application: Snaiderz, LLC (${{ secrets.APPLE_TEAM_ID }})"
          security unlock-keychain -p "$KCPASS" "$KEYCHAIN"
          codesign --force --timestamp --keychain "$KEYCHAIN" --sign "$IDENTITY" NvoVPN.dmg
          xcrun notarytool submit NvoVPN.dmg \
            --key "$RUNNER_TEMP/asc.p8" --key-id "${{ secrets.APPLE_ASC_KEY_ID }}" --issuer "${{ secrets.APPLE_ASC_ISSUER_ID }}" \
            --wait
          xcrun stapler staple NvoVPN.dmg
          echo "✓ NvoVPN.dmg готов"
          ls -lh NvoVPN.dmg

      - name: 'Upload .dmg'
        uses: actions/upload-artifact@v4
        with:
          name: nvovpn-macos-dmg
          path: NvoVPN.dmg
          retention-days: 14
          if-no-files-found: warn

      - name: 'Publish .dmg to Release'
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload test-macos-1 NvoVPN.dmg --clobber -R "${{ github.repository }}" || \
          gh release create test-macos-1 NvoVPN.dmg -R "${{ github.repository }}" -t "NvoVPN macOS (.dmg)" -n "Developer ID signed + notarized"
